<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>친구 관계 관리</title>
</head>
<body>
<h1>친구 관계 관리</h1>
<p><a href="/admin">대시보드로 돌아가기</a></p>
<p th:if="${message}" th:text="${message}"></p>
<table>
    <thead><tr><th>Owner</th><th>Friend</th><th>Alias</th><th>Action</th></tr></thead>
    <tbody>
    <tr th:each="friendship : ${friendships}">
        <td th:text="${friendship.owner.email}"></td>
        <td th:text="${friendship.friend.email}"></td>
        <td th:text="${friendship.friendAlias}"></td>
        <td>
            <form th:action="@{/admin/friendships/{id}/delete(id=${friendship.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
