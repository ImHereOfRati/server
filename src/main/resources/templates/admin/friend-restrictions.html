<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>친구 차단 관리</title>
</head>
<body>
<h1>친구 차단 관리</h1>
<p><a href="/admin">대시보드로 돌아가기</a></p>
<p th:if="${message}" th:text="${message}"></p>
<table>
    <thead><tr><th>Restrictor</th><th>Restricted</th><th>Type</th><th>Action</th></tr></thead>
    <tbody>
    <tr th:each="restriction : ${restrictions}">
        <td th:text="${restriction.restrictor.email}"></td>
        <td th:text="${restriction.restricted.email}"></td>
        <td th:text="${restriction.type}"></td>
        <td>
            <form th:action="@{/admin/friend-restrictions/{id}/delete(id=${restriction.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
