<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사용자 관리</title>
</head>
<body>
<h1>사용자 관리</h1>
<p><a href="/admin">대시보드로 돌아가기</a></p>
<table>
    <thead><tr><th>Email</th><th>Nickname</th><th>Role</th><th>Status</th></tr></thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.email}"></td>
        <td th:text="${user.nickname}"></td>
        <td th:text="${user.role}"></td>
        <td th:text="${user.status}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
